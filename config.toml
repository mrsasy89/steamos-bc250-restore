# cyan-skillfish-governor-smu — Profilo: performance-stable v3
# Safe-points da: filippor/cyan-skillfish-governor ramo smu (ufficiale)
# Testato con: CP2077, Resident Evil 4 Remake — stabile, nessun crash
# Data validazione: 05 giu 2026
#
# CHANGELOG rispetto a v2:
#   - Voltage 2000 MHz: 1000mV → 960mV (corretto su valori ufficiali)
#   - Aggiunti safe-points intermedi: 1175/850, 1700/920, 1850/930
#   - Rimossi 2150/2200 MHz (non validati, commentati nei sorgenti ufficiali)
#   - max frequency: 2200 → 2000 MHz (primo step stabile prima di OC avanzato)
#   - burst-samples: 60 → 25 (più reattivo in gaming)

[timing.intervals]
sample = 500
adjust = 200_000

[gpu-usage]
fix-metrics = true
method = "busy-flag"
flush-every = 10

[gpu]
set-method = "smu"

[dbus]
enabled = true

[timing.ramp-rates]
normal = 1
burst = 50

[timing]
burst-samples = 25        # più reattivo in gaming vs default 60
down-events = 20          # resistenza downscale — default doc = 5

[frequency-thresholds]
adjust = 10

[load-target]
upper = 0.80
lower = 0.60              # mantiene freq più a lungo sotto carico

[temperature]
throttling = 83           # limite termico confermato su Lenovo Legion Go Gen1
throttling_recovery = 73

[frequency-range]
min = 1000
max = 2000                # step stabile validato — prossimo: 2150/2200 con voltage corretti

# Curva validata — safe-points ufficiali filippor/cyan-skillfish-governor ramo smu
# Fonte: https://github.com/filippor/cyan-skillfish-governor/blob/smu/default-config.toml

[[safe-points]]
frequency = 1000
voltage = 800             # idle

[[safe-points]]
frequency = 1175
voltage = 850             # transizione bassa (punto ufficiale)

[[safe-points]]
frequency = 1500
voltage = 900             # mid

[[safe-points]]
frequency = 1700
voltage = 920             # pre-gaming (punto ufficiale)

[[safe-points]]
frequency = 1850
voltage = 930             # gaming stabile (punto ufficiale)

[[safe-points]]
frequency = 2000
voltage = 960             # gaming principale — validato CP2077 + RE4R

