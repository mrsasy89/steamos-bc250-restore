# cyan-skillfish-governor-smu — Profilo: performance-balanced v5
# Profilo DEFINITIVO validato su Lenovo Legion Go Gen 1 / AMD BC-250
# Data validazione: 05 giu 2026
#
# Testato con: CP2077, Resident Evil Requiem, Horizon Zero Dawn Remastered, Diablo IV
# Risultato: stabile, nessun crash, compilazione shader Vulkan OK
#
# CHANGELOG rispetto a v4:
#   - min frequency: 1500 → 1000 (lascia headroom CPU durante compilazione shader)
#   - max frequency: 2100 → 2000 (profilo bilanciato CPU+GPU)
#   - burst-samples: 15 → 25 (meno aggressivo nel ramp-up)
#   - down-events: 40 → 30 (bilanciato tra stabilità FPS e risparmio)
#   - upper: 0.85 → 0.90 (sale di freq solo con GPU davvero satura)
#
# LEZIONE APPRESA — Compilazione shader Vulkan:
#   La compilazione shader è 100% CPU-bound (CPU 90-95%, GPU quasi idle).
#   Con min=1500 il governor teneva la GPU a 1500 MHz anche durante la compilazione,
#   sommando consumo CPU+GPU e crashando il sistema con schermo nero.
#   Con min=1000 la GPU scende a idle durante la compilazione — nessun crash.
#
# Abbinato a: CPU OC 3800 MHz, scale=-12 (trovato da bc250_detect.py)

[timing.intervals]
sample = 500
adjust = 200_000

[gpu-usage]
fix-metrics = true
method = "busy-flag"
flush-every = 10

[gpu]
set-method = "smu"

[dbus]
enabled = true

[timing.ramp-rates]
normal = 1
burst = 50

[timing]
burst-samples = 25        # reattivo in gaming, non aggressivo in compile
down-events = 30          # bilanciato — default doc = 5

[frequency-thresholds]
adjust = 10

[load-target]
upper = 0.90              # sale di freq solo con GPU davvero satura
lower = 0.70              # mantiene freq sotto carico, evita oscillazioni FPS

[temperature]
throttling = 83           # limite termico confermato su Lenovo Legion Go Gen1
throttling_recovery = 73

[frequency-range]
min = 1000                # CRITICO: 1000 non 1500 — lascia headroom CPU durante shader compile
max = 2000                # profilo bilanciato definitivo — prossimo step: 2100 dopo ulteriori test

# Curva validata — safe-points ufficiali filippor/cyan-skillfish-governor ramo smu
# Fonte: https://github.com/filippor/cyan-skillfish-governor/blob/smu/default-config.toml

[[safe-points]]
frequency = 1000
voltage = 800             # idle / compilazione shader

[[safe-points]]
frequency = 1175
voltage = 850             # transizione bassa

[[safe-points]]
frequency = 1500
voltage = 900             # mid

[[safe-points]]
frequency = 1700
voltage = 920             # pre-gaming

[[safe-points]]
frequency = 1850
voltage = 930             # gaming stabile

[[safe-points]]
frequency = 2000
voltage = 960             # gaming principale — validato tutti i titoli testati

